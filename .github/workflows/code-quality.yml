name: Code Quality Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze:
    name: Analyze & Report
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5

      - name: Run Lint
        continue-on-error: true
        run: ./gradlew lint

      - name: Find Issues
        run: |
          echo "=== Hardcoded Strings ==="
          grep -r "setText(\"" app/src/main/java/ || echo "None found"
          echo "=== Null Safety Issues ==="
          grep -r "!!" app/src/main/java/ || echo "None found"